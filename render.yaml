services:
  - type: web
    name: xrp-simulator
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: LIVE_UPDATER
        value: true
      - key: LIVE_INTERVAL_SEC
        value: 60
